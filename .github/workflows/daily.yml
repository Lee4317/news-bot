name: daily-news

on:
  schedule:
    - cron: '0 22 * * *' # 한국 시간 오전 7시 실행
  workflow_dispatch: # 수동 실행 버튼 생성
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      # 낡은 도구 v3를 최신형 v4로 교체
      - uses: actions/checkout@v4 
      
      - name: Set up Python
        # 낡은 도구 v4를 최신형 v5로 교체
        uses: actions/setup-python@v5 
        with:
          python-version: '3.9'
          
      - run: pip install requests beautifulsoup4 lxml
      
      - name: Run
        env:
          NAVER_USER_ID: ${{ secrets.NAVER_USER_ID }}
          NAVER_USER_PW: ${{ secrets.NAVER_USER_PW }}
        run: python news_script.py
